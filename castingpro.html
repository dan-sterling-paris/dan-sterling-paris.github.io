<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Casting Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- CSV Parser -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: #f0f2f5; 
            -webkit-tap-highlight-color: transparent; 
            color: #111827;
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            overscroll-behavior-y: none; /* Prevents pull-to-refresh rubber banding */
        }

        .safe-top { padding-top: max(1rem, env(safe-area-inset-top)); }
        .safe-bottom { padding-bottom: max(2rem, env(safe-area-inset-bottom)); }

        .bottom-sheet { 
            transform: translateY(100%); 
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); 
        }
        .bottom-sheet.active { transform: translateY(0); }

        .modal-overlay {
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .ios-blur {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Prevent iOS zoom */
        input, select, textarea { font-size: 16px !important; }

        /* Fat-finger utility classes */
        .input-massive {
            @apply h-20 rounded-[1.5rem] text-xl px-6 bg-white border-2 border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none w-full shadow-sm font-black text-gray-800 transition-all;
        }

        /* Edge-to-Edge Zero Precision Buttons */
        .btn-zero-precision {
            @apply w-full bg-blue-600 text-white font-black text-3xl uppercase tracking-widest flex justify-center items-center gap-4 transition-colors active:bg-blue-800;
            padding-top: 2rem;
            padding-bottom: max(2rem, env(safe-area-inset-bottom)); /* Extends into the iOS home indicator safe area */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- AUTH OVERLAY -->
    <div id="authOverlay" class="fixed inset-0 bg-gray-900 z-[100] flex flex-col justify-center items-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md shadow-2xl overflow-hidden flex flex-col">
            <div class="p-8 space-y-8 flex-1">
                <div class="text-center mt-4">
                    <i class="fa-solid fa-clapperboard text-7xl text-blue-600 mb-6 drop-shadow-md"></i>
                    <h2 class="text-5xl font-black text-gray-900 tracking-tight">Casting</h2>
                    <p class="text-xl text-gray-500 font-bold mt-3">Sign in to begin</p>
                </div>
                <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
                    <input type="email" id="authEmail" class="input-massive bg-gray-50" placeholder="Email Address" required>
                    <input type="password" id="authPassword" class="input-massive bg-gray-50" placeholder="Password" required>
                    <div id="authError" class="text-red-500 text-lg font-bold text-center hidden"></div>
                </form>
            </div>
            <!-- Zero Precision Login Button -->
            <button form="loginForm" type="submit" id="authBtn" class="btn-zero-precision shadow-[0_-10px_30px_rgba(0,0,0,0.1)] shrink-0">
                Sign In <i class="fa-solid fa-arrow-right-to-bracket text-4xl"></i>
            </button>
        </div>
    </div>

    <!-- STICKY HEADER & FILTERS -->
    <div class="sticky top-0 z-30 ios-blur shadow-sm border-b border-gray-200 safe-top flex flex-col gap-4 pb-4">
        
        <!-- Row 1: Header -->
        <header class="px-5 flex justify-between items-center gap-3">
            <div class="flex-1 min-w-0 bg-gray-100 rounded-[1.5rem] px-5 py-2 flex items-center h-16">
                <select id="projectSelector" class="w-full bg-transparent outline-none font-black text-xl text-gray-800 cursor-pointer truncate" onchange="changeProject(this.value)">
                    <option value="">Loading Projects...</option>
                </select>
            </div>
            <button id="undoBtn" onclick="executeUndo()" class="bg-gray-100 text-gray-600 w-16 h-16 rounded-[1.5rem] flex items-center justify-center active:bg-gray-200 transition opacity-50 cursor-not-allowed shrink-0">
                <i class="fa-solid fa-rotate-left text-2xl"></i>
            </button>
        </header>

        <!-- Row 2: One-Tap Tools -->
        <div class="px-5 flex gap-3">
            <button onclick="autoFillFromLinks()" class="flex-1 bg-purple-100 text-purple-700 h-16 rounded-[1.5rem] flex items-center justify-center font-black text-xl active:bg-purple-200 gap-3 shadow-sm border border-purple-200">
                <i class="fa-solid fa-wand-magic-sparkles text-2xl"></i> AutoFill
            </button>
            <button onclick="openTemplatesModal()" class="bg-blue-100 text-blue-700 w-16 h-16 rounded-[1.5rem] flex items-center justify-center active:bg-blue-200 shrink-0 shadow-sm border border-blue-200">
                <i class="fa-solid fa-envelope-open-text text-2xl"></i>
            </button>
            <button onclick="document.getElementById('csvInput').click()" class="bg-gray-200 text-gray-700 w-16 h-16 rounded-[1.5rem] flex items-center justify-center active:bg-gray-300 shrink-0 shadow-sm border border-gray-300">
                <i class="fa-solid fa-file-import text-2xl"></i>
            </button>
            <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleCSVUpload(event)">
        </div>

        <!-- Row 3: Search Bar -->
        <div class="px-5">
            <div class="relative w-full">
                <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 text-2xl"></i>
                <input type="text" id="searchFilter" oninput="renderAuditions()" class="w-full h-20 bg-white rounded-[2rem] pl-16 pr-5 font-black text-2xl text-gray-800 shadow-sm border-[3px] border-gray-200 outline-none focus:border-blue-400 placeholder-gray-400 transition" placeholder="Search actor name...">
            </div>
        </div>

        <!-- Row 4: Status & Date Filters -->
        <div class="px-5 flex gap-3">
            <div class="flex-1 relative">
                <select id="filterDate" onchange="renderAuditions()" class="w-full h-16 bg-white border-2 border-gray-200 font-black text-gray-700 rounded-[1.5rem] pl-4 pr-10 outline-none shadow-sm text-lg appearance-none cursor-pointer truncate">
                    <option value="ALL">All Dates</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
            </div>
            <div class="flex-1 relative">
                <select id="filterStatus" onchange="renderAuditions()" class="w-full h-16 bg-white border-2 border-gray-200 font-black text-gray-700 rounded-[1.5rem] pl-4 pr-10 outline-none shadow-sm text-lg appearance-none cursor-pointer truncate">
                    <option value="ALL">All Active</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT LIST -->
    <main id="auditionsList" class="flex-1 px-4 py-6 space-y-8 safe-bottom">
        <div class="flex flex-col items-center justify-center h-full text-gray-400 space-y-4 pt-16">
            <i class="fa-solid fa-circle-notch fa-spin text-5xl"></i>
            <p class="text-xl font-bold">Loading schedule...</p>
        </div>
    </main>

    <!-- ACTION SHEET (For Existing Actors) -->
    <div id="actionSheetOverlay" class="fixed inset-0 bg-black/50 modal-overlay z-40" onclick="closeAllModals()"></div>
    <div id="actionSheet" class="fixed bottom-0 left-0 right-0 bg-gray-50 rounded-t-[2.5rem] z-50 bottom-sheet shadow-[0_-20px_50px_rgba(0,0,0,0.15)] pt-4 px-5 max-h-[90vh] overflow-y-auto safe-bottom pb-10 border-t border-gray-200">
        <div class="w-20 h-2 bg-gray-300 rounded-full mx-auto mb-8"></div>
        <div id="actionSheetContent" class="space-y-4">
            <!-- Dynamically populated -->
        </div>
    </div>

    <!-- MODAL: ZERO-TYPING FILL SLOT (Tinder Style) -->
    <div id="fillModalOverlay" class="fixed inset-0 bg-black/60 modal-overlay z-50 flex items-end sm:items-center justify-center">
        <div class="bg-gray-100 w-full sm:max-w-md h-[95vh] sm:h-[85vh] rounded-t-[2.5rem] sm:rounded-[2.5rem] flex flex-col shadow-2xl transform transition-transform" onclick="event.stopPropagation()">
            <div class="px-6 py-6 bg-white rounded-t-[2.5rem] sm:rounded-t-[2.5rem] border-b border-gray-200 flex justify-between items-center sticky top-0 z-10">
                <div>
                    <h3 class="text-3xl font-black text-gray-900">Who to cast?</h3>
                    <p class="text-gray-500 font-bold text-base mt-1">Tap an actor to auto-fill</p>
                </div>
                <button onclick="closeAllModals()" class="bg-gray-100 text-gray-500 w-14 h-14 rounded-full flex items-center justify-center active:bg-gray-200 transition">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
            </div>
            
            <!-- Quick Search -->
            <div class="p-5 bg-white border-b border-gray-200">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 text-2xl"></i>
                    <input type="text" id="fillActorSearch" oninput="filterUnbookedActors(this.value)" class="w-full h-20 bg-gray-100 rounded-[2rem] pl-16 pr-5 font-black text-xl text-gray-800 outline-none focus:bg-gray-200 transition" placeholder="Search unbooked...">
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-3" id="unbookedActorsList">
                <!-- Zero-typing buttons populate here -->
            </div>

            <!-- Fallback Manual Entry -->
            <div class="p-5 bg-white border-t border-gray-200 safe-bottom shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                <button onclick="toggleManualEntry()" class="w-full h-16 border-[3px] border-gray-300 rounded-[2rem] text-gray-500 font-black text-xl flex justify-center items-center gap-3 active:bg-gray-50 transition">
                    <i class="fa-solid fa-keyboard text-2xl"></i> Or type manually
                </button>
                <div id="manualEntryForm" class="hidden mt-6 space-y-4 pb-4">
                    <input type="text" id="inpFirstName" class="input-massive" placeholder="First Name">
                    <input type="text" id="inpLastName" class="input-massive" placeholder="Last Name">
                    <input type="email" id="inpEmail" class="input-massive" placeholder="Agent Email">
                    <input type="text" id="inpAgent" class="input-massive" placeholder="Agent Name">
                    <input type="text" id="inpRole" class="input-massive" placeholder="Role">
                    <button onclick="saveManualAudition()" class="w-full h-20 rounded-[2rem] text-2xl font-black shadow-xl flex items-center justify-center gap-4 active:scale-[0.98] bg-blue-600 text-white mt-4">
                        Save & Send <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: ZERO-TYPING MOVE SLOT -->
    <div id="moveModalOverlay" class="fixed inset-0 bg-black/60 modal-overlay z-50 flex items-end sm:items-center justify-center">
        <div class="bg-gray-100 w-full sm:max-w-md h-[90vh] sm:h-[80vh] rounded-t-[2.5rem] sm:rounded-[2.5rem] flex flex-col shadow-2xl" onclick="event.stopPropagation()">
            <div class="px-6 py-6 bg-white rounded-t-[2.5rem] border-b border-gray-200 flex justify-between items-center sticky top-0 z-10">
                <div>
                    <h3 class="text-3xl font-black text-gray-900">Select New Time</h3>
                    <p class="text-gray-500 font-bold text-base mt-1">Tap an empty slot to move</p>
                </div>
                <button onclick="closeAllModals()" class="bg-gray-100 text-gray-500 w-14 h-14 rounded-full flex items-center justify-center active:bg-gray-200">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-5 space-y-4" id="freeSlotsList">
                <!-- Zero-typing move buttons populate here -->
            </div>
        </div>
    </div>

    <!-- MODAL: TEMPLATES -->
    <div id="templatesModalOverlay" class="fixed inset-0 bg-black/60 modal-overlay z-50 flex items-end sm:items-center justify-center">
        <div class="bg-white w-full sm:max-w-xl h-[95vh] sm:h-[85vh] rounded-t-[2.5rem] sm:rounded-[2.5rem] flex flex-col shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
            <!-- Header -->
            <div class="px-6 py-6 border-b border-gray-200 flex justify-between items-center bg-white z-10 shrink-0">
                <h3 class="text-3xl font-black text-gray-900">Email Templates</h3>
                <button onclick="closeAllModals()" class="bg-gray-100 text-gray-500 w-14 h-14 rounded-full flex items-center justify-center active:bg-gray-200">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
            </div>
            
            <!-- Scrollable Form Body -->
            <div class="flex-1 overflow-y-auto p-6 space-y-6 bg-white">
                <div>
                    <label class="block text-base font-black text-gray-500 uppercase tracking-widest mb-3 ml-2">Default Sender</label>
                    <input type="email" id="tmplSender" class="input-massive bg-gray-50 border-none px-6" placeholder="dan@debbieobrien.net">
                </div>
                <div>
                    <label class="block text-base font-black text-gray-500 uppercase tracking-widest mb-3 ml-2">Select Template</label>
                    <div class="relative">
                        <select id="tmplType" class="input-massive bg-gray-50 border-none px-6 appearance-none cursor-pointer" onchange="loadTemplateForm(this.value)">
                            <option value="audition">Initial Audition</option>
                            <option value="modification">Time Change (Move)</option>
                            <option value="chase">Chase Confirmation</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-6 top-1/2 -translate-y-1/2 text-gray-400 text-xl pointer-events-none"></i>
                    </div>
                </div>
                <div>
                    <label class="block text-base font-black text-gray-500 uppercase tracking-widest mb-3 ml-2">Subject</label>
                    <input type="text" id="tmplSubject" class="input-massive bg-gray-50 border-none px-6">
                </div>
                <div>
                    <label class="block text-base font-black text-gray-500 uppercase tracking-widest mb-3 ml-2">Body</label>
                    <textarea id="tmplBody" rows="10" class="w-full bg-gray-50 rounded-[2rem] p-6 text-xl font-bold text-gray-800 outline-none border-none focus:ring-4 focus:ring-blue-100 resize-none leading-relaxed shadow-inner"></textarea>
                </div>
                <div class="bg-blue-50 p-6 rounded-[2rem] text-base text-blue-900 font-bold leading-relaxed border border-blue-100">
                    Supported Placeholders:<br/>
                    <div class="mt-3 flex flex-wrap gap-2">
                        <span class="bg-white px-3 py-1.5 rounded-xl shadow-sm border border-blue-100 font-black"><<First Name>></span>
                        <span class="bg-white px-3 py-1.5 rounded-xl shadow-sm border border-blue-100 font-black"><<Second Name>></span>
                        <span class="bg-white px-3 py-1.5 rounded-xl shadow-sm border border-blue-100 font-black"><<Role>></span>
                        <span class="bg-white px-3 py-1.5 rounded-xl shadow-sm border border-blue-100 font-black"><<Date>></span>
                        <span class="bg-white px-3 py-1.5 rounded-xl shadow-sm border border-blue-100 font-black"><<Time>></span>
                        <span class="bg-white px-3 py-1.5 rounded-xl shadow-sm border border-blue-100 font-black"><<Venue>></span>
                        <span class="bg-white px-3 py-1.5 rounded-xl shadow-sm border border-blue-100 font-black"><<Link>></span>
                        <span class="bg-white px-3 py-1.5 rounded-xl shadow-sm border border-blue-100 font-black"><<Project>></span>
                    </div>
                </div>
            </div>

            <!-- Zero Precision Save Button (Sticky to bottom) -->
            <button id="saveTmplBtn" onclick="saveTemplate()" class="btn-zero-precision shrink-0 shadow-[0_-10px_30px_rgba(0,0,0,0.15)] z-20">
                <i class="fa-solid fa-floppy-disk text-4xl"></i> Save Settings
            </button>
        </div>
    </div>

    <script>
        // --- SUPABASE CONFIGURATION ---
        const SUPABASE_URL = 'https://oaltkxblacpjjecpauya.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hbHRreGJsYWNwamplY3BhdXlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4OTc2ODQsImV4cCI6MjA4NDQ3MzY4NH0.zDfKgAKfWjXMQsOP5ZpD_nl6yhZS1O4H794HqSRDLVo';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- STATE & DATA ---
        let projects = [];
        let activeProject = null;
        let auditions = [];
        let templates = [];
        let uniqueActorsData = []; // Available from links
        
        let activeAuditionId = null;
        let undoStack = [];

        // Exact Placeholders requested by user
        const BOILERPLATES = {
            audition: { 
                subject: "<<Project>> - <<First Name>> <<Second Name>> - Audition", 
                body: "Hi all,\n\nI trust this email finds you well and having a good week so far.\n\nThank you so much for suggesting <<First Name>> for the upcoming run of <<Project>>.\n\nI'd love to arrange a meeting for <<First Name>> with the team as follows :\n\nROLE : <<Role>>\n\nDATE : <<Date>>\n\nTIME : <<Time>>\n\nVenue : <<Venue>>\n\nTo Prepare\nPlease could we ask <<First Name>> to prepare as per the audition information sheet in the Dropbox link below :\n\n<<Link>>\n\nIf you have any questions, please do let me know. Otherwise, I'd be very grateful if you could confirm whether <<First Name>> will be attending that would be very much appreciated.\n\n\nThanks so much,\n\nDan" 
            },
            modification: { 
                subject: "<<Project>> - <<First Name>> <<Second Name>> - Updated Audition Time", 
                body: "Hi all,\n\nI trust this email finds you well.\n\nWe have moved the audition for <<First Name>> for the role of <<Role>>. The new slot is <<Time>> on <<Date>>.\n\nVenue : <<Venue>>\n\nTo Prepare\nPlease could we ask <<First Name>> to prepare as per the audition information sheet in the Dropbox link below :\n\n<<Link>>\n\nPlease reply to confirm this new time works for them.\n\n\nThanks so much,\n\nDan" 
            },
            chase: {
                subject: "<<Project>> - <<First Name>> <<Second Name>> - Audition Confirmation",
                body: "Hi all,\n\nI trust this email finds you well.\n\nAs this is soon, I am just following up to see if we can get confirmation for <<First Name>>'s audition for the upcoming run of <<Project>>.\n\nROLE : <<Role>>\nDATE : <<Date>>\nTIME : <<Time>>\nVenue : <<Venue>>\n\nPlease could you confirm whether <<First Name>> will be attending?\n\n\nThanks so much,\n\nDan"
            }
        };

        // --- AUTH & INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('authOverlay').classList.add('hidden');
                await loadProjects();
            }

            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN') {
                    document.getElementById('authOverlay').classList.add('hidden');
                    await loadProjects();
                } else if (event === 'SIGNED_OUT') {
                    document.getElementById('authOverlay').classList.remove('hidden');
                    projects = [];
                    auditions = [];
                    document.getElementById('auditionsList').innerHTML = '';
                    document.getElementById('projectSelector').innerHTML = '<option value="">Loading Projects...</option>';
                }
            });
        });

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const btn = document.getElementById('authBtn');
            const err = document.getElementById('authError');
            
            err.classList.add('hidden');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-5xl"></i> SIGNING IN...';
            btn.disabled = true;

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                err.textContent = error.message;
                err.classList.remove('hidden');
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
        }

        // ============================================================================
        // CORE DATA LOADERS
        // ============================================================================
        async function loadProjects() {
            const { data, error } = await supabaseClient.from('projects').select('*').order('created_at', { ascending: false });
            if (error) return console.error("Error fetching projects", error);
            
            projects = data || [];
            const selector = document.getElementById('projectSelector');
            selector.innerHTML = '';
            
            if (projects.length === 0) {
                const { data: newProj } = await supabaseClient.from('projects').insert({ name: 'Untitled Project' }).select().single();
                if(newProj) projects.push(newProj);
                else { selector.innerHTML = '<option>No Projects</option>'; return; }
            }

            projects.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.name;
                selector.appendChild(opt);
            });

            if(projects.length > 0) {
                activeProject = projects[0];
                selector.value = activeProject.id;
                await loadData();
            }
        }

        async function changeProject(projectId) {
            activeProject = projects.find(p => p.id === projectId);
            if (activeProject) {
                undoStack = []; 
                updateUndoButton();
                await loadData();
            }
        }

        async function loadData() {
            if (!activeProject) return;
            document.getElementById('auditionsList').innerHTML = '<div class="flex flex-col items-center justify-center h-full text-gray-400 space-y-4 pt-16"><i class="fa-solid fa-circle-notch fa-spin text-6xl"></i><p class="text-2xl font-bold">Loading schedule...</p></div>';
            
            // Pull templates for cross-device sync
            const { data: tData } = await supabaseClient.from('templates').select('*').eq('project_id', activeProject.id);
            templates = tData || [];

            const { data: aData, error } = await supabaseClient.from('auditions')
                .select('*')
                .eq('project_id', activeProject.id);

            if (error) { console.error("Error fetching auditions:", error); return; }
            
            auditions = aData || [];
            
            updateFilterOptions();
            renderAuditions();
            prefetchLinks(); // Preload for zero-typing list
        }

        function refreshData() { loadData(); }

        // ============================================================================
        // FILTERS & UI RENDER (Fat Finger Optimized)
        // ============================================================================
        function updateFilterOptions() {
            // Date Filter
            const dateSelect = document.getElementById('filterDate');
            const currentVal = dateSelect.value;
            dateSelect.innerHTML = '<option value="ALL">All Dates</option>';
            
            const uniqueDates = [...new Set(auditions.map(a => a.date))].sort();
            uniqueDates.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                let displayDate = d;
                try {
                    const parts = d.split('/');
                    if(parts.length === 3) {
                        const dateObj = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
                        displayDate = dateObj.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
                    }
                } catch(e) {}
                opt.textContent = displayDate;
                dateSelect.appendChild(opt);
            });
            if(uniqueDates.includes(currentVal)) dateSelect.value = currentVal;

            // Status Filter (Requirement 7 & 8)
            const statusSelect = document.getElementById('filterStatus');
            const currentStatusVal = statusSelect.value;
            statusSelect.innerHTML = '<option value="ALL">All Active</option>';
            
            const standardStatuses = ['empty', 'pending', 'confirmed', 'Audition Not Sent', 'declined'];
            const allFoundStatuses = [...new Set(auditions.map(a => a.status))];
            
            const combinedStatuses = [...new Set([...standardStatuses, ...allFoundStatuses])]
                .filter(s => s !== 'archived')
                .sort();

            combinedStatuses.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s.charAt(0).toUpperCase() + s.slice(1);
                statusSelect.appendChild(opt);
            });

            if(combinedStatuses.includes(currentStatusVal)) statusSelect.value = currentStatusVal;
        }

        function renderAuditions() {
            const list = document.getElementById('auditionsList');
            list.innerHTML = '';

            let filteredAuditions = auditions;
            const dFilter = document.getElementById('filterDate').value;
            const sFilter = document.getElementById('filterStatus').value;
            const qSearch = document.getElementById('searchFilter').value.toLowerCase().trim();

            // Apply Date Filter
            if (dFilter !== 'ALL') filteredAuditions = filteredAuditions.filter(a => a.date === dFilter);
            
            // Apply Status Filter
            if (sFilter !== 'ALL') {
                filteredAuditions = filteredAuditions.filter(a => a.status === sFilter);
            } else {
                // Default view hides archived/declined unless directly specified
                filteredAuditions = filteredAuditions.filter(a => a.status !== 'archived' && a.status !== 'declined');
            }

            // Apply Search Filter (Requirement 15)
            if (qSearch) {
                filteredAuditions = filteredAuditions.filter(a => {
                    const fullName = `${a.firstName || ''} ${a.lastName || ''}`.toLowerCase();
                    return fullName.includes(qSearch) && a.status !== 'empty';

            if (filteredAuditions.length === 0) {

        async function prefetchLinks() {
            const { data } = await supabaseClient.from('links').select('*');

            const existingNames = new Set(
                auditions.filter(a => a.firstName).map(a => `${a.firstName || ''} ${a.lastName || ''}`.trim().toLowerCase())
            );

            uniqueActorsData = [];
            const seen = new Set();
            data.forEach(l => {
                if(!l.name) return;
                const fullName = l.name.trim();
                const lowerName = fullName.toLowerCase();
                
                if(!existingNames.has(lowerName) && !seen.has(lowerName)) {
                    seen.add(lowerName);
                    const nameParts = fullName.split(' ');
                    uniqueActorsData.push({
                        fullName: fullName,
                        firstName: nameParts[0] || '',
                        lastName: nameParts.slice(1).join(' ') || '',
                        email: l.agents_email || '',
                        agent: l.agents || '',
                        role: l.role || ''
                    });
                }
            });
        }

        async function manuallyUpdateStatus(newStatus) {
            if(!activeAuditionId) return;
            const a = auditions.find(x => x.id === activeAuditionId);
            if(!a || a.status === newStatus) return;

            let emptySlotToArchive = null;
            if (a.status === 'declined' && ['pending', 'confirmed', 'Audition Not Sent'].includes(newStatus)) {
                const emptySlot = auditions.find(x => x.date === a.date && x.time === a.time && x.status === 'empty');
                if (emptySlot) {
                    emptySlotToArchive = emptySlot.id;
                    await supabaseClient.from('auditions').update({ status: 'archived' }).eq('id', emptySlot.id);
                } else {
                    alert("Cannot restore: This time slot is fully booked. Free up a slot first.");
                    return;
                }
            }

            const oldState = { status: a.status };
            pushUndo('manual_status', { id: a.id, oldState: oldState, archivedEmptySlotId: emptySlotToArchive });

            await supabaseClient.from('auditions').update({ status: newStatus }).eq('id', a.id);
            closeAllModals();
            loadData();
        }

        async function executeMoveFlow(newSlotId) {
            // Requirement 3: Move to Free Slot -> Email -> Pending
            const oldA = auditions.find(x => x.id === activeAuditionId);
            const newA = auditions.find(x => x.id === newSlotId);
            if(!oldA || !newA) return;

            const oldSlotState = { status: oldA.status };
            const newSlotState = { firstName: newA.firstName, lastName: newA.lastName, agent: newA.agent, email: newA.email, role: newA.role, status: newA.status };

            await supabaseClient.from('auditions').update({
                firstName: oldA.firstName, lastName: oldA.lastName,
                agent: oldA.agent, email: oldA.email, role: oldA.role,
                status: 'pending'
            }).eq('id', newSlotId);

            await supabaseClient.from('auditions').update({ status: 'archived' }).eq('id', oldA.id);
            
            const { data: newFreedSlot } = await supabaseClient.from('auditions').insert({
                project_id: oldA.project_id, date: oldA.date, time: oldA.time, duration: oldA.duration, status: 'empty'
            }).select().single();

            pushUndo('move_slot', { oldSlotId: oldA.id, oldSlotState, newSlotId: newSlotId, newSlotState, newFreedSlotId: newFreedSlot?.id });

            const payload = { firstName: oldA.firstName, lastName: oldA.lastName, email: oldA.email, role: oldA.role };
            const newIndex = auditions.findIndex(x => x.id === newSlotId);
            if(newIndex > -1) auditions[newIndex] = { ...auditions[newIndex], ...payload };
            
            sendEmail('modification', newSlotId);
            closeAllModals();
            loadData();
        }

        // ============================================================================
        // AUTOFILL FROM LINKS (Req 6)
        // ============================================================================
        async function autoFillFromLinks() {
            if(!activeProject) return;
            document.getElementById('auditionsList').innerHTML = '<div class="flex flex-col items-center justify-center h-full text-purple-600 space-y-4 pt-16"><i class="fa-solid fa-wand-magic-sparkles fa-bounce text-6xl"></i><p class="text-2xl font-bold">Auto-filling magic...</p></div>';

            const { data: linksData } = await supabaseClient.from('links').select('*');
            if (!linksData) { loadData(); return; }

            const existingNames = new Set(auditions.filter(a => a.firstName).map(a => `${a.firstName || ''} ${a.lastName || ''}`.trim().toLowerCase()));
            const uniqueAvailableLinks = [];
            const seenAvailable = new Set();
            
            for (const l of linksData) {
                if(!l.name) continue;
                const lowerName = l.name.trim().toLowerCase();
                if(!existingNames.has(lowerName) && !seenAvailable.has(lowerName)) {
                    seenAvailable.add(lowerName);
                    uniqueAvailableLinks.push(l);
                }
            }

            const emptySlots = auditions.filter(a => a.status === 'empty').sort((a,b) => {
                const diff = a.date.localeCompare(b.date);
                return diff !== 0 ? diff : a.time.localeCompare(b.time);
            });

            if(emptySlots.length === 0 || uniqueAvailableLinks.length === 0) {
                alert("No empty slots available or no unbooked actors found.");
                loadData();
                return;
            }

            const updatesToMake = [];
            const undoSlots = [];
            const limit = Math.min(emptySlots.length, uniqueAvailableLinks.length);

            for(let i=0; i < limit; i++) {
                const slot = emptySlots[i];
                const link = uniqueAvailableLinks[i];

                undoSlots.push({ id: slot.id, oldState: { firstName: null, lastName: null, agent: null, email: null, role: null, status: 'empty' } });

                const nameParts = link.name.trim().split(' ');
                updatesToMake.push({
                    id: slot.id, firstName: nameParts[0] || '', lastName: nameParts.slice(1).join(' ') || '',
                    agent: link.agents || null, email: link.agents_email || null, role: link.role || null,
                    status: 'Audition Not Sent' 
                });
            }

            pushUndo('autofill_links', { slots: undoSlots });

            for(const u of updatesToMake) {
                const { id, ...payload } = u;
                await supabaseClient.from('auditions').update(payload).eq('id', id);
            }
            loadData();
        }

                btn.disabled = true;
                
                const senderEmail = document.getElementById('tmplSender').value.trim();
                localStorage.setItem('casting_sender_email', senderEmail);

                const type = document.getElementById('tmplType').value;
                const subject = document.getElementById('tmplSubject').value;
                const body = document.getElementById('tmplBody').value;

                // 1. Delete to bypass exact ID matching & unique constraint schema issues
                await supabaseClient
                    .from('templates')
                    .delete()
                    .eq('project_id', activeProject.id)
                    .eq('type', type);

                // 2. Insert fresh template logic for absolute cross-device reliability
                const { error: insertError } = await supabaseClient
                    .from('templates')
                    .insert({ 
                        project_id: activeProject.id, 
                        type: type, 
                        subject: subject, 
                        body: body 
                    });

                if (insertError) {
                    throw new Error(insertError.message);
                }

                // Force refresh local template cache globally so app recognizes the new template
                await loadData();
                
                // Success Visuals
                btn.innerHTML = '<i class="fa-solid fa-check text-5xl"></i> SAVED!';
                btn.classList.remove('bg-blue-600', 'active:bg-blue-800');
                btn.classList.add('bg-green-500', 'active:bg-green-600');
                
                setTimeout(() => {
                    closeAllModals();
                }, 1000);

            } catch(err) {
                console.error("Save Template Exception:", err);
                alert("Save Failed: " + (err.message || "Unknown error"));
            } finally {
                // Guaranteed button UI reset
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('bg-green-500', 'active:bg-green-600');
                    btn.classList.add('bg-blue-600', 'active:bg-blue-800');
                    btn.disabled = false;
                }, 1200);
            }
        }

        function sendEmail(type, targetId = null) {
            const id = targetId || activeAuditionId;
            const a = auditions.find(x => x.id === id);
            
            if(!a || !a.email) return alert("No agent email address found to send to.");
            
            // Will pull from correctly updated `templates` variable
            let tmpl = templates.find(x => x.type === type) || BOILERPLATES[type];

            const rep = (str) => str
                .replace(/<<First Name>>/gi, a.firstName || 'your client')
                .replace(/<<Second Name>>/gi, a.lastName || '')
                .replace(/<<Role>>/gi, a.role || 'the role')
                .replace(/<<Date>>/gi, a.date || '')
                .replace(/<<Time>>/gi, a.time || '')
                .replace(/<<Venue>>/gi, activeProject.venue || 'TBC')
                .replace(/<<Link>>/gi, activeProject.material_link || 'TBC')
                .replace(/<<Project>>/gi, activeProject.name || 'Our Project');
            
            const senderEmail = localStorage.getItem('casting_sender_email') || 'dan@debbieobrien.net';
            const mailto = `mailto:${a.email}?subject=${encodeURIComponent(rep(tmpl.subject))}&body=${encodeURIComponent(rep(tmpl.body))}&from=${encodeURIComponent(senderEmail)}`;
            window.location.href = mailto;
        }

        // ============================================================================
        // UTILS & UNDO & CSV
        // ============================================================================
        function closeAllModals() {
            document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.bottom-sheet').forEach(el => el.classList.remove('active'));
            document.getElementById('manualEntryForm')?.classList.add('hidden');
            activeAuditionId = null;
        }

        function pushUndo(actionType, data) {
            undoStack.push({ type: actionType, data: data });
            updateUndoButton();
        }

        function updateUndoButton() {
            const btn = document.getElementById('undoBtn');
            if (undoStack.length > 0) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed', 'text-gray-600');
                btn.classList.add('text-blue-600');
                btn.disabled = false;
            } else {
                btn.classList.add('opacity-50', 'cursor-not-allowed', 'text-gray-600');
                btn.classList.remove('text-blue-600');
                btn.disabled = true;
            }
        }

        async function executeUndo() {
            if (undoStack.length === 0) return;
            const action = undoStack.pop();
            document.getElementById('auditionsList').innerHTML = '<div class="flex flex-col items-center justify-center h-full text-blue-600 space-y-4 pt-16"><i class="fa-solid fa-rotate-left fa-spin-reverse text-7xl"></i><p class="text-2xl font-bold">Reverting action...</p></div>';

            try {
                if (action.type === 'fill_slot') await supabaseClient.from('auditions').update(action.data.oldState).eq('id', action.data.id);
                else if (action.type === 'cancel_slot') {
                    if(action.data.newEmptySlotId) {
                        const { data: slotCheck } = await supabaseClient.from('auditions').select('status').eq('id', action.data.newEmptySlotId).single();
                        if(slotCheck && slotCheck.status === 'empty') await supabaseClient.from('auditions').update({ status: 'archived' }).eq('id', action.data.newEmptySlotId);
                    }
                    await supabaseClient.from('auditions').update(action.data.oldState).eq('id', action.data.id);
                } 
                else if (action.type === 'move_slot') {
                    await supabaseClient.from('auditions').update(action.data.newSlotState).eq('id', action.data.newSlotId);
                    await supabaseClient.from('auditions').update(action.data.oldSlotState).eq('id', action.data.oldSlotId);
                    if (action.data.newFreedSlotId) await supabaseClient.from('auditions').update({ status: 'archived' }).eq('id', action.data.newFreedSlotId);
                } 
                else if (action.type === 'manual_status') {
                    await supabaseClient.from('auditions').update(action.data.oldState).eq('id', action.data.id);
                    if (action.data.archivedEmptySlotId) await supabaseClient.from('auditions').update({ status: 'empty' }).eq('id', action.data.archivedEmptySlotId);
                }
                else if (action.type === 'autofill_links') {
                    for(const slot of action.data.slots) await supabaseClient.from('auditions').update(slot.oldState).eq('id', slot.id);
                } 
                else if (action.type === 'import_csv') {
                    if(action.data.newIds && action.data.newIds.length > 0) await supabaseClient.from('auditions').update({ status: 'archived' }).in('id', action.data.newIds);
                    if(action.data.oldAuditions && action.data.oldAuditions.length > 0) await supabaseClient.from('auditions').insert(action.data.oldAuditions);
                }
            } catch (err) { console.error("Undo failed", err); }
            updateUndoButton();
            loadData();
        }

        function handleCSVUpload(event) {
            const file = event.target.files[0];
            if (!file || !activeProject) return;
            document.getElementById('auditionsList').innerHTML = '<div class="flex flex-col items-center justify-center h-full text-blue-600 space-y-4 pt-16"><i class="fa-solid fa-file-import fa-bounce text-7xl"></i><p class="text-2xl font-bold">Importing Data...</p></div>';
            
            Papa.parse(file, {
                header: true, skipEmptyLines: true,
                complete: async function(results) {
                    const { data: currentAuds } = await supabaseClient.from('auditions').select('*').eq('project_id', activeProject.id);
                    await supabaseClient.from('auditions').delete().eq('project_id', activeProject.id); // Truncate

                    const inserts = results.data.map(row => {
                        const hasActor = row['First Name'] && row['First Name'].trim() !== '';
                        let parsedStatus = row['Status'] || row['status'] || row['Merge status'] || (hasActor ? 'pending' : 'empty');
                        return {
                            project_id: activeProject.id, date: row['Date'] || '', time: row['Time'] || '', duration: parseInt(row['Duration']) || 15,
                            firstName: row['First Name'] || null, lastName: row['Second Name'] || row['Last Name'] || null, agent: row['Agent'] || null,
                            email: row['Email'] || null, role: row['Role'] || null, status: parsedStatus
                        };
                    });
                    
                    const { data: newlyInserted } = await supabaseClient.from('auditions').insert(inserts).select();
                    pushUndo('import_csv', { oldAuditions: currentAuds || [], newIds: newlyInserted ? newlyInserted.map(i => i.id) : [] });
                    event.target.value = ''; 
                    loadData();
                }
            });
        }
    </script>
</body>
