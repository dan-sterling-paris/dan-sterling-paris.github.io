<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShowDown Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { overscroll-behavior-y: contain; }
        .bar-fill { transition: width 0.6s ease-out; }
        .skeleton { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="bg-gray-100 h-[100dvh] w-screen text-gray-800 font-sans flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="shrink-0 bg-white border-b border-gray-200 shadow-sm z-20">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-scale-balanced text-pink-500 text-xl"></i>
                <h1 class="text-xl font-bold text-gray-800">ShowDown</h1>
                <span class="text-xs text-gray-400 font-medium ml-1 hidden sm:inline">Dashboard</span>
            </div>
            <div class="flex items-center gap-2">
                <a href="spinder3.html" class="text-xs font-bold px-3 py-2 rounded-xl border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 transition-colors flex items-center gap-1.5">
                    <i class="fa-solid fa-users-gear text-pink-400"></i> Review
                </a>
                <a href="showdown.html" class="text-xs font-bold px-3 py-2 rounded-xl border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 transition-colors flex items-center gap-1.5">
                    <i class="fa-solid fa-ranking-star text-orange-400"></i> Rank
                </a>
            </div>
        </div>
    </header>

    <!-- Scrollable content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6">
        <div class="max-w-6xl mx-auto w-full">

            <!-- Overview Stats -->
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 text-center">
                    <i class="fa-solid fa-users text-pink-500 text-sm mb-1"></i>
                    <div id="stat-total" class="text-2xl font-bold text-gray-800"><span class="inline-block w-10 h-7 bg-gray-200 rounded skeleton"></span></div>
                    <div class="text-xs text-gray-500 mt-0.5">Total Candidates</div>
                </div>
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 text-center">
                    <i class="fa-solid fa-circle-check text-green-500 text-sm mb-1"></i>
                    <div id="stat-reviewed" class="text-2xl font-bold text-gray-800"><span class="inline-block w-10 h-7 bg-gray-200 rounded skeleton"></span></div>
                    <div class="text-xs text-gray-500 mt-0.5">Reviewed</div>
                </div>
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 text-center">
                    <i class="fa-solid fa-clock text-amber-500 text-sm mb-1"></i>
                    <div id="stat-pending" class="text-2xl font-bold text-gray-800"><span class="inline-block w-10 h-7 bg-gray-200 rounded skeleton"></span></div>
                    <div class="text-xs text-gray-500 mt-0.5">Pending</div>
                </div>
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 text-center">
                    <i class="fa-solid fa-star text-orange-400 text-sm mb-1"></i>
                    <div id="stat-avg" class="text-2xl font-bold text-gray-800"><span class="inline-block w-10 h-7 bg-gray-200 rounded skeleton"></span></div>
                    <div class="text-xs text-gray-500 mt-0.5">Avg Score</div>
                </div>
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 text-center">
                    <i class="fa-solid fa-scale-balanced text-purple-500 text-sm mb-1"></i>
                    <div id="stat-sessions" class="text-2xl font-bold text-gray-800"><span class="inline-block w-10 h-7 bg-gray-200 rounded skeleton"></span></div>
                    <div class="text-xs text-gray-500 mt-0.5">Ranking Sessions</div>
                </div>
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 text-center">
                    <i class="fa-solid fa-arrows-left-right text-blue-500 text-sm mb-1"></i>
                    <div id="stat-comparisons" class="text-2xl font-bold text-gray-800"><span class="inline-block w-10 h-7 bg-gray-200 rounded skeleton"></span></div>
                    <div class="text-xs text-gray-500 mt-0.5">Comparisons</div>
                </div>
            </div>

            <!-- Scoring Section -->
            <h2 class="text-lg font-bold text-gray-700 mb-3"><i class="fa-solid fa-chart-bar text-pink-500 mr-2"></i>Scoring</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
                <!-- Score Distribution -->
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
                    <h3 class="text-sm font-bold text-gray-600 mb-3">Score Distribution</h3>
                    <div id="score-dist" class="space-y-1.5">
                        <div class="text-xs text-gray-400 text-center py-8"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i>Loading...</div>
                    </div>
                </div>
                <!-- By Role -->
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
                    <h3 class="text-sm font-bold text-gray-600 mb-3">By Role</h3>
                    <div id="role-stats" class="max-h-72 overflow-y-auto">
                        <div class="text-xs text-gray-400 text-center py-8"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i>Loading...</div>
                    </div>
                </div>
                <!-- Top Agents -->
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
                    <h3 class="text-sm font-bold text-gray-600 mb-3">Top Agents</h3>
                    <div id="agent-stats" class="max-h-72 overflow-y-auto">
                        <div class="text-xs text-gray-400 text-center py-8"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i>Loading...</div>
                    </div>
                </div>
            </div>

            <!-- Ranking Section -->
            <h2 class="text-lg font-bold text-gray-700 mb-3"><i class="fa-solid fa-ranking-star text-pink-500 mr-2"></i>Ranking</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
                <!-- Sessions -->
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
                    <h3 class="text-sm font-bold text-gray-600 mb-3">Sessions</h3>
                    <div id="session-list" class="space-y-2 max-h-96 overflow-y-auto">
                        <div class="text-xs text-gray-400 text-center py-8"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i>Loading...</div>
                    </div>
                </div>
                <!-- Leaderboard -->
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
                    <h3 class="text-sm font-bold text-gray-600 mb-3">Leaderboard</h3>
                    <div id="leaderboard" class="max-h-96 overflow-y-auto">
                        <div class="text-xs text-gray-400 text-center py-8"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i>Loading...</div>
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <h2 class="text-lg font-bold text-gray-700 mb-3"><i class="fa-solid fa-clock-rotate-left text-pink-500 mr-2"></i>Recent Activity</h2>
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 mb-8">
                <div id="recent-activity">
                    <div class="text-xs text-gray-400 text-center py-8"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i>Loading...</div>
                </div>
            </div>

            <div class="pb-8"></div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-2xl transition-all duration-300 -translate-y-24 z-50 flex items-center gap-3">
        <i class="fa-solid fa-circle-info text-pink-400"></i>
        <span id="toast-msg" class="text-sm font-medium">Message</span>
    </div>

    <script>
        const appConfig = {
            url: 'https://oaltkxblacpjjecpauya.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hbHRreGJsYWNwamplY3BhdXlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4OTc2ODQsImV4cCI6MjA4NDQ3MzY4NH0.zDfKgAKfWjXMQsOP5ZpD_nl6yhZS1O4H794HqSRDLVo',
            table: 'links',
            sessionsTable: 'showdown_sessions'
        };

        let supabaseClient = null;

        // --- UTILS ---
        function displayName(item) {
            const first = (item.first_name || '').trim();
            const last = (item.last_name || '').trim();
            if (first || last) return [first, last].filter(Boolean).join(' ');
            return (item.name || 'Unknown').trim();
        }

        function toProperCase(s) {
            if (!s) return '';
            return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
        }

        function timeAgo(dateStr) {
            if (!dateStr) return '';
            const diff = Date.now() - new Date(dateStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs}h ago`;
            const days = Math.floor(hrs / 24);
            if (days < 30) return `${days}d ago`;
            return `${Math.floor(days / 30)}mo ago`;
        }

        function scoreColour(score) {
            if (score >= 7) return { bar: 'bg-green-400', badge: 'bg-green-100 text-green-700' };
            if (score >= 4) return { bar: 'bg-amber-400', badge: 'bg-amber-100 text-amber-700' };
            return { bar: 'bg-red-400', badge: 'bg-red-100 text-red-700' };
        }

        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = message;
            toast.classList.remove('-translate-y-24');
            toast.classList.add('translate-y-0');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove('translate-y-0'); toast.classList.add('-translate-y-24'); }, 3000);
        }

        // --- DATA FETCHING ---
        async function fetchAll(table) {
            let all = [];
            let from = 0;
            const step = 1000;
            while (true) {
                const { data, error } = await supabaseClient.from(table).select('*').range(from, from + step - 1);
                if (error) throw error;
                if (!data || data.length === 0) break;
                all = all.concat(data);
                if (data.length < step) break;
                from += step;
            }
            return all;
        }

        // --- COMPUTE ---
        function computeOverview(links, sessions) {
            const total = links.length;
            const reviewed = links.filter(l => l.decision != null && l.decision !== '').length;
            const scores = links.map(l => parseInt(l.decision)).filter(d => !isNaN(d) && d >= 1 && d <= 10);
            const avg = scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '-';
            const totalComparisons = sessions.reduce((sum, s) => sum + (s.comparison_count || 0), 0);
            return { total, reviewed, pending: total - reviewed, avg, sessionCount: sessions.length, totalComparisons };
        }

        function computeScoreDist(links) {
            const counts = {};
            for (let i = 1; i <= 10; i++) counts[i] = 0;
            links.forEach(l => {
                const d = parseInt(l.decision);
                if (d >= 1 && d <= 10) counts[d]++;
            });
            const max = Math.max(1, ...Object.values(counts));
            return { counts, max };
        }

        function computeRoleStats(links) {
            const map = {};
            links.forEach(l => {
                const role = (l.role || '').trim();
                if (!role) return;
                if (!map[role]) map[role] = { role, count: 0, scores: [] };
                map[role].count++;
                const d = parseInt(l.decision);
                if (d >= 1 && d <= 10) map[role].scores.push(d);
            });
            return Object.values(map)
                .map(r => ({ ...r, avg: r.scores.length > 0 ? (r.scores.reduce((a, b) => a + b, 0) / r.scores.length).toFixed(1) : '-' }))
                .sort((a, b) => b.count - a.count);
        }

        function computeAgentStats(links) {
            const map = {};
            links.forEach(l => {
                const agent = (l.agents || '').trim();
                if (!agent) return;
                const key = agent.toLowerCase();
                if (!map[key]) map[key] = { agent: toProperCase(agent), count: 0, scores: [] };
                map[key].count++;
                const d = parseInt(l.decision);
                if (d >= 1 && d <= 10) map[key].scores.push(d);
            });
            return Object.values(map)
                .map(a => ({ ...a, avg: a.scores.length > 0 ? (a.scores.reduce((a2, b) => a2 + b, 0) / a.scores.length).toFixed(1) : '-' }))
                .sort((a, b) => b.count - a.count);
        }

        function computeSessionCards(sessions) {
            return sessions
                .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
                .map(s => {
                    const state = s.state || {};
                    const pool = (state.activePool || []).sort((a, b) => (b.elo || 0) - (a.elo || 0));
                    const top3 = pool.slice(0, 3).map(c => ({ name: c.name || 'Unknown', elo: Math.round(c.elo || 0) }));
                    const date = new Date(s.updated_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                    return {
                        sessionName: s.session_name,
                        roleFilter: s.role_filter === 'all' ? 'All Roles' : (s.role_filter || 'All Roles'),
                        comparisonCount: s.comparison_count || 0,
                        date,
                        top3
                    };
                });
        }

        function computeLeaderboard(sessions) {
            const map = {};
            sessions.forEach(s => {
                const state = s.state || {};
                (state.activePool || []).forEach(c => {
                    const key = c.url || c.id;
                    if (!key) return;
                    if (!map[key]) map[key] = { name: c.name || 'Unknown', elos: [], sessions: 0 };
                    map[key].elos.push(c.elo || 1500);
                    map[key].sessions++;
                });
            });
            let entries = Object.values(map);
            // Prefer candidates in multiple sessions; fall back to all
            const multi = entries.filter(e => e.sessions > 1);
            if (multi.length >= 3) entries = multi;
            return entries
                .map(e => ({ ...e, avgElo: Math.round(e.elos.reduce((a, b) => a + b, 0) / e.elos.length) }))
                .sort((a, b) => b.avgElo - a.avgElo)
                .slice(0, 20);
        }

        // --- RENDER ---
        function renderOverview(stats) {
            document.getElementById('stat-total').textContent = stats.total.toLocaleString();
            document.getElementById('stat-reviewed').textContent = stats.reviewed.toLocaleString();
            document.getElementById('stat-pending').textContent = stats.pending.toLocaleString();
            document.getElementById('stat-avg').textContent = stats.avg;
            document.getElementById('stat-sessions').textContent = stats.sessionCount;
            document.getElementById('stat-comparisons').textContent = stats.totalComparisons.toLocaleString();
        }

        function renderScoreDist(dist) {
            const el = document.getElementById('score-dist');
            let html = '';
            for (let i = 10; i >= 1; i--) {
                const count = dist.counts[i];
                const pct = (count / dist.max) * 100;
                const colour = scoreColour(i);
                html += `<div class="flex items-center gap-2">
                    <span class="w-5 text-right text-xs font-bold text-gray-500">${i}</span>
                    <div class="flex-1 bg-gray-100 rounded-full h-5 overflow-hidden">
                        <div class="h-full rounded-full bar-fill ${colour.bar}" style="width: ${pct}%"></div>
                    </div>
                    <span class="w-10 text-right text-xs text-gray-500 font-medium">${count}</span>
                </div>`;
            }
            el.innerHTML = html;
        }

        function renderRoleStats(roles) {
            const el = document.getElementById('role-stats');
            if (roles.length === 0) { el.innerHTML = '<div class="text-xs text-gray-400 text-center py-4">No roles found</div>'; return; }
            el.innerHTML = roles.map(r => `<div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
                <span class="text-sm text-gray-700 truncate flex-1 mr-2">${r.role}</span>
                <span class="text-xs bg-pink-50 text-pink-600 font-bold px-2 py-0.5 rounded-full shrink-0">${r.count}</span>
                <span class="text-xs text-gray-400 ml-2 w-10 text-right shrink-0">${r.avg}</span>
            </div>`).join('');
        }

        function renderAgentStats(agents) {
            const el = document.getElementById('agent-stats');
            if (agents.length === 0) { el.innerHTML = '<div class="text-xs text-gray-400 text-center py-4">No agents found</div>'; return; }
            el.innerHTML = agents.map(a => `<div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
                <span class="text-sm text-gray-700 truncate flex-1 mr-2">${a.agent}</span>
                <span class="text-xs bg-pink-50 text-pink-600 font-bold px-2 py-0.5 rounded-full shrink-0">${a.count}</span>
                <span class="text-xs text-gray-400 ml-2 w-10 text-right shrink-0">${a.avg}</span>
            </div>`).join('');
        }

        function renderSessionCards(sessions) {
            const el = document.getElementById('session-list');
            if (sessions.length === 0) { el.innerHTML = '<div class="text-xs text-gray-400 text-center py-4">No ranking sessions yet</div>'; return; }
            el.innerHTML = sessions.map(s => {
                const top3Html = s.top3.map((c, i) => {
                    const bg = i === 0 ? 'bg-amber-50 text-amber-700' : 'bg-gray-50 text-gray-600';
                    return `<span class="text-xs ${bg} px-2 py-0.5 rounded-full truncate max-w-[10rem]">${i + 1}. ${c.name} (${c.elo})</span>`;
                }).join('');
                return `<div class="border border-gray-100 rounded-xl p-3">
                    <div class="flex items-center justify-between mb-1.5">
                        <h4 class="font-bold text-sm text-gray-800 truncate flex-1 mr-2">${s.sessionName}</h4>
                        <span class="text-xs text-gray-400 shrink-0">${s.date}</span>
                    </div>
                    <div class="flex items-center gap-3 text-xs text-gray-500 mb-2">
                        <span><i class="fa-solid fa-filter mr-1"></i>${s.roleFilter}</span>
                        <span><i class="fa-solid fa-arrows-left-right mr-1"></i>${s.comparisonCount} comparisons</span>
                    </div>
                    <div class="flex flex-wrap gap-1">${top3Html || '<span class="text-xs text-gray-300">No candidates yet</span>'}</div>
                </div>`;
            }).join('');
        }

        function renderLeaderboard(entries) {
            const el = document.getElementById('leaderboard');
            if (entries.length === 0) { el.innerHTML = '<div class="text-xs text-gray-400 text-center py-4">No ranking data yet</div>'; return; }
            el.innerHTML = entries.map((e, i) => {
                const rank = i + 1;
                const rankColour = rank <= 3 ? 'text-pink-500' : 'text-gray-400';
                let icon = '';
                if (rank === 1) icon = '<i class="fa-solid fa-trophy text-amber-500 text-xs ml-1"></i>';
                else if (rank === 2) icon = '<i class="fa-solid fa-medal text-gray-400 text-xs ml-1"></i>';
                else if (rank === 3) icon = '<i class="fa-solid fa-medal text-amber-700 text-xs ml-1"></i>';
                return `<div class="flex items-center gap-2 py-2 border-b border-gray-50 last:border-0">
                    <span class="w-6 text-right text-xs font-bold ${rankColour}">${rank}</span>
                    <span class="flex-1 text-sm text-gray-700 truncate">${e.name}${icon}</span>
                    <span class="text-xs font-mono text-gray-500">${e.avgElo}</span>
                    <span class="text-xs text-gray-300 shrink-0">${e.sessions > 1 ? e.sessions + ' sessions' : ''}</span>
                </div>`;
            }).join('');
        }

        function renderRecentActivity(links) {
            const el = document.getElementById('recent-activity');
            const recent = links
                .filter(l => l.updated_at)
                .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
                .slice(0, 10);
            if (recent.length === 0) { el.innerHTML = '<div class="text-xs text-gray-400 text-center py-4">No recent activity</div>'; return; }
            el.innerHTML = recent.map(l => {
                const name = toProperCase(displayName(l));
                const d = parseInt(l.decision);
                const hasScore = d >= 1 && d <= 10;
                const colour = hasScore ? scoreColour(d) : { badge: 'bg-gray-100 text-gray-400' };
                const scoreBadge = hasScore ? d : 'Pending';
                return `<div class="flex items-center gap-3 py-2.5 border-b border-gray-50 last:border-0">
                    <span class="text-sm font-medium text-gray-700 flex-1 truncate">${name}</span>
                    <span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full truncate max-w-[8rem] shrink-0">${l.role || 'No role'}</span>
                    <span class="text-xs font-bold px-2 py-0.5 rounded-full ${colour.badge} shrink-0">${scoreBadge}</span>
                    <span class="text-xs text-gray-400 shrink-0 w-14 text-right">${timeAgo(l.updated_at)}</span>
                </div>`;
            }).join('');
        }

        // --- INIT ---
        async function init() {
            try {
                supabaseClient = supabase.createClient(appConfig.url, appConfig.key);
            } catch (e) {
                showToast('Failed to connect to database');
                return;
            }

            try {
                const [links, sessions] = await Promise.all([
                    fetchAll(appConfig.table),
                    fetchAll(appConfig.sessionsTable)
                ]);

                renderOverview(computeOverview(links, sessions));
                renderScoreDist(computeScoreDist(links));
                renderRoleStats(computeRoleStats(links));
                renderAgentStats(computeAgentStats(links));
                renderSessionCards(computeSessionCards(sessions));
                renderLeaderboard(computeLeaderboard(sessions));
                renderRecentActivity(links);
            } catch (error) {
                console.error('Dashboard error:', error);
                showToast('Failed to load dashboard data');
            }
        }

        init();
    </script>
</body>
</html>
