name: Daily Football Roundup

# 02:00 UTC = 03:00 BST (late March – late October)
#           = 02:00 GMT (late October – late March)
# GitHub cron is always UTC; DST conversion is handled by running at 02:00 UTC year-round.
# This gives the correct 03:00 UK time in summer; winter posts arrive one hour early.
on:
  schedule:
    - cron: "0 2 * * *"

  # Allow manual triggers from the Actions tab.
  # Set dry_run=true to preview a post without committing anything.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print post to log, do not commit"
        type: boolean
        default: false
      window_hours:
        description: "Hours to look back for new videos (default 24)"
        type: string
        default: "24"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the new post

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate daily post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DRY_RUN=""
          [[ "${{ github.event.inputs.dry_run }}" == "true" ]] && DRY_RUN="--dry-run"
          HOURS="${{ github.event.inputs.window_hours }}"
          HOURS="${HOURS:-24}"
          python scripts/generate_post.py $DRY_RUN --window-hours "$HOURS"

      - name: Commit and push new post
        # Only runs on scheduled/dispatched runs that are NOT dry-runs
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/src/content/posts/
          if git diff --staged --quiet; then
            echo "No new post generated — nothing to commit."
          else
            git commit -m "chore: daily roundup $(date -u +%Y-%m-%d)"
            git push origin HEAD
          fi
