name: Daily Football Roundup

# 02:00 UTC = 03:00 BST (late March – late October)
#           = 02:00 GMT (late October – late March)
on:
  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print post to log, do not commit anything"
        type: boolean
        default: false
      window_hours:
        description: "Hours to look back for new videos (default 24)"
        type: string
        default: "24"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate daily post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DRY_RUN=""
          [[ "${{ github.event.inputs.dry_run }}" == "true" ]] && DRY_RUN="--dry-run"
          HOURS="${{ github.event.inputs.window_hours }}"
          python scripts/generate_post.py $DRY_RUN --window-hours "${HOURS:-24}"

      - name: Check whether a new post was written
        id: check
        run: |
          git add blog/src/content/posts/
          if git diff --staged --quiet; then
            echo "new_post=false" >> $GITHUB_OUTPUT
            echo "No new post — skipping build and commit."
          else
            echo "new_post=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node 20
        if: steps.check.outputs.new_post == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: blog/package-lock.json

      - name: Install Astro dependencies
        if: steps.check.outputs.new_post == 'true'
        working-directory: blog
        run: npm ci

      - name: Build Astro site
        if: steps.check.outputs.new_post == 'true'
        working-directory: blog
        run: npm run build

      - name: Sync built site → /football
        if: steps.check.outputs.new_post == 'true'
        run: |
          mkdir -p football
          rsync -a --delete blog/dist/ football/
          git add football/

      - name: Commit and push
        if: steps.check.outputs.new_post == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: daily roundup $(date -u +%Y-%m-%d)"
          git push origin HEAD
