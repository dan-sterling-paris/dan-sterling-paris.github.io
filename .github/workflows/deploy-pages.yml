name: Deploy to GitHub Pages

# Re-build and deploy whenever a new post is pushed, or when the blog
# layout / config changes.  Also runs on manual dispatch for a forced rebuild.
on:
  push:
    branches: [main]
    paths:
      - "blog/**"
      - "topic.yaml"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress so a mid-deploy
# push doesn't leave the site in a broken state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: blog/package-lock.json

      - name: Install Astro dependencies
        working-directory: blog
        run: npm install

      - name: Build Astro site
        working-directory: blog
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
